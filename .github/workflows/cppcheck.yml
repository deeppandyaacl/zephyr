# Added Test Branch
# Testing
name: Cppcheck CI
on:
  push:
    branches:
      - '**'    # Runs before pushing to the main branch
    paths:
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.h'
  pull_request:
    branches:
      - '**'  # Runs before merging into main
    paths:
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.h'

jobs:
  cppcheck_cpp:
    runs-on: ubuntu-20.04  # Use Ubuntu 20.04 For consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Checkout the repository code

      - name: Set up environment and install cppcheck
        run: |
          sudo apt update
          sudo apt install -y cppcheck  # Install cppcheck

      - name: Run cppcheck and generate report
        run: |
          # cppcheck --enable=warning,performance,portability,style --xml --xml-version=2 . 2> cppcheck-report.xml  # Running cppcheck
          cppcheck $(pwd)/file \
          --xml \
          --output-file=cppcheck-report.xml \
          --enable=warning,performance,portability,style \
          -I$(pwd)/file/zephyr/soc/arm/common \
          -I$(pwd)/file/zephyr/lib/libc/newlib/include \
          -I$(pwd)/file/zephyr/modules/hal
      - name: Print Current Working Directory (pwd)
        run: |
          echo "Current working directory: $(pwd)"  # Print current directory
          ls -al


      - name: Upload cppcheck report as artifact
        uses: actions/upload-artifact@v4.0.0  #Uploads the cppcheck report1
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
